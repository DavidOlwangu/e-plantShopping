<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Paradise Nursery 🌿</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/redux/4.2.1/redux.min.js"></script>
<style>
:root{--green-dark:#1a2e1a;--green-mid:#2d5a27;--green-light:#4a7c3f;--green-pale:#a8c5a0;--cream:#f5f0e8;--cream-dark:#e8e0d0;--gold:#c9a84c;--gold-light:#e8c97a;--text-dark:#1a1a1a;--text-mid:#4a4a4a;--white:#fff;--shadow-soft:0 4px 24px rgba(0,0,0,.12);--shadow-card:0 2px 12px rgba(0,0,0,.08);--radius:12px;--transition:.25s ease}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Lato',sans-serif;color:var(--text-dark);background:var(--cream);line-height:1.6;-webkit-font-smoothing:antialiased}
h1,h2,h3{font-family:'Playfair Display',serif;line-height:1.2}

/* ─── LANDING ─── */
.landing-page{min-height:100vh;width:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem;background:linear-gradient(135deg,rgba(26,46,26,.84) 0%,rgba(45,90,39,.72) 50%,rgba(26,46,26,.90) 100%),url('https://images.unsplash.com/photo-1530968033775-2c92736b131e?w=1800&auto=format&fit=crop') center/cover no-repeat fixed;position:relative;overflow:hidden}
.landing-page::before,.landing-page::after{content:'';position:absolute;width:200px;height:200px;border:2px solid rgba(201,168,76,.4);pointer-events:none}
.landing-page::before{top:32px;left:32px;border-right:none;border-bottom:none}
.landing-page::after{bottom:32px;right:32px;border-left:none;border-top:none}
.landing-content{position:relative;z-index:2;max-width:680px;animation:fadeUp 1s ease both}
.landing-badge{display:inline-block;font-size:.75rem;font-weight:700;letter-spacing:.25em;text-transform:uppercase;color:var(--gold);border:1px solid rgba(201,168,76,.5);padding:.4rem 1.2rem;border-radius:100px;margin-bottom:1.5rem}
.landing-title{font-size:clamp(3rem,8vw,5.5rem);font-weight:700;color:var(--white);line-height:1.05;margin-bottom:.25rem;text-shadow:0 2px 20px rgba(0,0,0,.3)}
.landing-title span{font-style:italic;color:var(--gold-light)}
.landing-tagline{font-size:1.1rem;color:rgba(245,240,232,.85);margin:1.5rem auto 2.5rem;font-weight:300;letter-spacing:.02em;max-width:480px}
.btn-primary{display:inline-block;font-size:.95rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--green-dark);background:var(--gold);padding:1rem 2.8rem;border-radius:100px;border:none;cursor:pointer;transition:background var(--transition),transform var(--transition),box-shadow var(--transition);box-shadow:0 4px 20px rgba(201,168,76,.4)}
.btn-primary:hover{background:var(--gold-light);transform:translateY(-2px);box-shadow:0 8px 28px rgba(201,168,76,.5)}

/* ─── NAVBAR ─── */
.navbar{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 2.5rem;height:64px;background:var(--green-dark);box-shadow:0 2px 16px rgba(0,0,0,.2)}
.navbar-brand{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:700;color:var(--cream);text-decoration:none;display:flex;align-items:center;gap:.4rem;cursor:pointer;background:none;border:none}
.navbar-links{display:flex;align-items:center;gap:2rem;list-style:none}
.navbar-links button{font-size:.88rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--cream-dark);text-decoration:none;background:none;border:none;cursor:pointer;transition:color var(--transition);font-family:'Lato',sans-serif}
.navbar-links button:hover{color:var(--gold)}
.cart-icon-btn{position:relative;background:none;border:none;cursor:pointer;color:var(--cream);display:flex;align-items:center;gap:.5rem;font-size:1.4rem;padding:.25rem;transition:color var(--transition)}
.cart-icon-btn:hover{color:var(--gold)}
.cart-badge{position:absolute;top:-8px;right:-10px;background:var(--gold);color:var(--green-dark);font-size:.65rem;font-weight:700;min-width:18px;height:18px;border-radius:100px;display:flex;align-items:center;justify-content:center;padding:0 4px}

/* ─── PRODUCT PAGE ─── */
.product-page{min-height:100vh;background:var(--cream);padding-bottom:4rem}
.product-page-header,.cart-page-header{background:linear-gradient(135deg,var(--green-dark) 0%,var(--green-mid) 100%);padding:3rem 2rem 2.5rem;text-align:center}
.product-page-header h1,.cart-page-header h1{font-size:clamp(2rem,5vw,3rem);color:var(--cream);margin-bottom:.5rem}
.product-page-header p,.cart-summary-counts{color:var(--green-pale);font-size:1rem}
.category-section{max-width:1200px;margin:3rem auto;padding:0 2rem}
.category-title{font-size:1.7rem;color:var(--green-dark);margin-bottom:1.5rem;padding-bottom:.5rem;border-bottom:2px solid var(--green-pale);display:flex;align-items:center;gap:.5rem}
.plant-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:1.5rem}
.plant-card{background:var(--white);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow-card);transition:transform var(--transition),box-shadow var(--transition);display:flex;flex-direction:column}
.plant-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-soft)}
.plant-card img{width:100%;height:200px;object-fit:cover;display:block}
.plant-card-body{padding:1rem 1.2rem 1.4rem;display:flex;flex-direction:column;flex:1}
.plant-name{font-size:1.05rem;color:var(--green-dark);margin-bottom:.3rem}
.plant-price{font-weight:700;color:var(--green-light);font-size:1rem;margin-bottom:1rem}
.btn-add-cart{margin-top:auto;background:var(--green-mid);color:var(--white);border:none;border-radius:8px;padding:.6rem 1rem;font-size:.85rem;font-weight:700;letter-spacing:.05em;cursor:pointer;transition:background var(--transition),opacity var(--transition);text-transform:uppercase;font-family:'Lato',sans-serif}
.btn-add-cart:hover:not(:disabled){background:var(--green-light)}
.btn-add-cart:disabled{background:var(--green-pale);cursor:not-allowed;opacity:.7}

/* ─── CART PAGE ─── */
.cart-page{min-height:100vh;background:var(--cream);padding-bottom:4rem}
.cart-container{max-width:900px;margin:2.5rem auto;padding:0 2rem}
.cart-totals-bar{background:var(--white);border-radius:var(--radius);padding:1.5rem 2rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;box-shadow:var(--shadow-card);margin-bottom:2rem}
.total-label{font-size:1.5rem;color:var(--green-dark)}
.total-amount{font-size:2rem;font-weight:700;color:var(--green-mid);font-family:'Playfair Display',serif}
.cart-item{background:var(--white);border-radius:var(--radius);padding:1.2rem 1.5rem;display:flex;align-items:center;gap:1.2rem;box-shadow:var(--shadow-card);margin-bottom:1rem;flex-wrap:wrap}
.cart-item img{width:80px;height:80px;object-fit:cover;border-radius:8px;flex-shrink:0}
.cart-item-info{flex:1;min-width:140px}
.cart-item-name{font-family:'Playfair Display',serif;font-size:1.05rem;color:var(--green-dark);margin-bottom:.2rem}
.cart-item-unit-price{font-size:.85rem;color:var(--text-mid)}
.qty-controls{display:flex;align-items:center;gap:.6rem}
.qty-btn{width:32px;height:32px;border-radius:50%;border:2px solid var(--green-pale);background:none;color:var(--green-mid);font-size:1.1rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background var(--transition),color var(--transition)}
.qty-btn:hover{background:var(--green-mid);color:var(--white);border-color:var(--green-mid)}
.qty-display{font-weight:700;font-size:1rem;min-width:24px;text-align:center}
.cart-item-subtotal{font-weight:700;font-size:1rem;color:var(--green-mid);min-width:70px;text-align:right}
.btn-delete{background:none;border:2px solid #e88;color:#c44;border-radius:50%;width:32px;height:32px;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:background var(--transition),color var(--transition);flex-shrink:0}
.btn-delete:hover{background:#c44;color:var(--white)}
.cart-actions{display:flex;gap:1rem;margin-top:2rem;flex-wrap:wrap}
.btn-continue{background:none;border:2px solid var(--green-mid);color:var(--green-mid);padding:.8rem 2rem;border-radius:8px;font-family:'Lato',sans-serif;font-size:.9rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;transition:background var(--transition),color var(--transition);display:inline-flex;align-items:center;gap:.4rem}
.btn-continue:hover{background:var(--green-mid);color:var(--white)}
.btn-checkout{background:var(--gold);border:none;color:var(--green-dark);padding:.8rem 2rem;border-radius:8px;font-family:'Lato',sans-serif;font-size:.9rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;transition:background var(--transition),transform var(--transition)}
.btn-checkout:hover{background:var(--gold-light);transform:translateY(-1px)}
.cart-empty{text-align:center;padding:4rem 2rem}
.cart-empty h2{font-family:'Playfair Display',serif;color:var(--green-dark);margin-bottom:1rem}
.cart-empty p{color:var(--text-mid);margin-bottom:2rem}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:600px){.navbar{padding:0 1.2rem}.cart-item{flex-direction:column;align-items:flex-start}.cart-totals-bar{flex-direction:column;text-align:center}}
</style>
</head>
<body>
<div id="root"></div>
<script>
// ═══════════════════════════════════════════
//  PARADISE NURSERY — Self-contained preview
//  Full React + Redux app in one HTML file
// ═══════════════════════════════════════════
const { createElement: h, useState, useReducer } = React;

// ── Plant Data ─────────────────────────────
const categories = [
  {id:'tropical', name:'🌺 Tropical Beauties', plants:[
    {id:'t1',name:'Monstera Deliciosa',price:34.99,image:'https://images.unsplash.com/photo-1614594975525-e45190c55d0b?w=400&auto=format&fit=crop'},
    {id:'t2',name:'Bird of Paradise',price:49.99,image:'https://images.unsplash.com/photo-1598880940080-ff9a29891b85?w=400&auto=format&fit=crop'},
    {id:'t3',name:'Peace Lily',price:22.99,image:'https://images.unsplash.com/photo-1593482892290-f54927ae2bbb?w=400&auto=format&fit=crop'},
    {id:'t4',name:'Calathea Orbifolia',price:28.99,image:'https://images.unsplash.com/photo-1616680214084-22671f27c4e3?w=400&auto=format&fit=crop'},
    {id:'t5',name:'Fiddle Leaf Fig',price:39.99,image:'https://images.unsplash.com/photo-1545239351-ef35f43d514b?w=400&auto=format&fit=crop'},
    {id:'t6',name:'Philodendron Brasil',price:19.99,image:'https://images.unsplash.com/photo-1602923668409-f4cdd4849c98?w=400&auto=format&fit=crop'},
  ]},
  {id:'succulent', name:'🌵 Succulents & Cacti', plants:[
    {id:'s1',name:'Echeveria Elegans',price:9.99,image:'https://images.unsplash.com/photo-1550411294-5c3c5e9abf93?w=400&auto=format&fit=crop'},
    {id:'s2',name:'Golden Barrel Cactus',price:14.99,image:'https://images.unsplash.com/photo-1485955900006-10f4d324d411?w=400&auto=format&fit=crop'},
    {id:'s3',name:'Jade Plant',price:12.99,image:'https://images.unsplash.com/photo-1629111243453-7e7e1f0a08f5?w=400&auto=format&fit=crop'},
    {id:'s4',name:'Aloe Vera',price:11.99,image:'https://images.unsplash.com/photo-1596547609652-9cf5d8c76ea2?w=400&auto=format&fit=crop'},
    {id:'s5',name:'Haworthia Fasciata',price:8.99,image:'https://images.unsplash.com/photo-1540420828642-fca2c5c18abe?w=400&auto=format&fit=crop'},
    {id:'s6',name:'String of Pearls',price:16.99,image:'https://images.unsplash.com/photo-1515238152791-8216bfdf89a7?w=400&auto=format&fit=crop'},
  ]},
  {id:'airpure', name:'💨 Air-Purifying Plants', plants:[
    {id:'a1',name:'Snake Plant',price:17.99,image:'https://images.unsplash.com/photo-1572688484438-313a6e50c333?w=400&auto=format&fit=crop'},
    {id:'a2',name:'Pothos Golden',price:12.99,image:'https://images.unsplash.com/photo-1601985705806-5b9a291f2e7b?w=400&auto=format&fit=crop'},
    {id:'a3',name:'Spider Plant',price:10.99,image:'https://images.unsplash.com/photo-1598880940080-ff9a29891b85?w=400&auto=format&fit=crop'},
    {id:'a4',name:'Boston Fern',price:15.99,image:'https://images.unsplash.com/photo-1566975340636-14236ae5b546?w=400&auto=format&fit=crop'},
    {id:'a5',name:'Rubber Plant',price:24.99,image:'https://images.unsplash.com/photo-1593691509543-c55fb32d8de5?w=400&auto=format&fit=crop'},
    {id:'a6',name:'ZZ Plant',price:21.99,image:'https://images.unsplash.com/photo-1622673038699-f71b09fde7c2?w=400&auto=format&fit=crop'},
  ]},
];

// ── Redux Reducer (CartSlice logic) ────────
function cartReducer(state={items:[]}, action){
  switch(action.type){
    case 'cart/addItem': {
      const existing = state.items.find(i=>i.id===action.payload.id);
      if(existing) return {...state,items:state.items.map(i=>i.id===action.payload.id?{...i,quantity:i.quantity+1}:i)};
      return {...state,items:[...state.items,{...action.payload,quantity:1}]};
    }
    case 'cart/removeItem':
      return {...state,items:state.items.filter(i=>i.id!==action.payload)};
    case 'cart/updateQuantity': {
      const {id,quantity}=action.payload;
      if(quantity<=0) return {...state,items:state.items.filter(i=>i.id!==id)};
      return {...state,items:state.items.map(i=>i.id===id?{...i,quantity}:i)};
    }
    default: return state;
  }
}

// ── Navbar Component ───────────────────────
function Navbar({page,setPage,cartItems}){
  const totalItems = cartItems.reduce((t,i)=>t+i.quantity,0);
  return h('nav',{className:'navbar'},
    h('button',{className:'navbar-brand',onClick:()=>setPage('home')},
      h('span',{className:'leaf'},'🌿'),' Paradise Nursery'
    ),
    h('ul',{className:'navbar-links'},
      h('li',null, h('button',{onClick:()=>setPage('home')},'Home')),
      h('li',null, h('button',{onClick:()=>setPage('plants')},'Plants')),
      h('li',null, h('button',{className:'cart-icon-btn',onClick:()=>setPage('cart')},
        '🛒',
        totalItems>0 && h('span',{className:'cart-badge'},totalItems)
      ))
    )
  );
}

// ── Landing Page ───────────────────────────
function LandingPage({setPage}){
  return h('div',{className:'landing-page'},
    h('div',{className:'landing-content'},
      h('span',{className:'landing-badge'},'Est. 2024 · Sustainably Sourced'),
      h('h1',{className:'landing-title'},'Paradise ',h('span',null,'Nursery')),
      h('p',{className:'landing-tagline'},
        'Welcome to ',h('strong',null,'Paradise Nursery'),' — where every home becomes a sanctuary. We curate the finest indoor plants, from air-purifying tropicals to rare succulents, sourced from sustainable growers around the world. Whether you\'re a seasoned plant parent or just beginning your green journey, we have the perfect companion for your space.'
      ),
      h('button',{className:'btn-primary',onClick:()=>setPage('plants')},'Get Started →')
    )
  );
}

// ── Product List Page ──────────────────────
function ProductList({setPage,cartItems,dispatch}){
  const isInCart = id => cartItems.some(i=>i.id===id);
  return h('div',{className:'product-page'},
    h(Navbar,{page:'plants',setPage,cartItems}),
    h('div',{className:'product-page-header'},
      h('h1',null,'Our Plants'),
      h('p',null,'Curated houseplants for every space and skill level')
    ),
    categories.map(cat=>
      h('section',{key:cat.id,className:'category-section'},
        h('h2',{className:'category-title'},cat.name),
        h('div',{className:'plant-grid'},
          cat.plants.map(plant=>
            h('div',{key:plant.id,className:'plant-card'},
              h('img',{src:plant.image,alt:plant.name}),
              h('div',{className:'plant-card-body'},
                h('h3',{className:'plant-name'},plant.name),
                h('p',{className:'plant-price'},'$'+plant.price.toFixed(2)),
                h('button',{
                  className:'btn-add-cart',
                  disabled:isInCart(plant.id),
                  onClick:()=>dispatch({type:'cart/addItem',payload:plant})
                }, isInCart(plant.id)?'✓ Added':'Add to Cart')
              )
            )
          )
        )
      )
    )
  );
}

// ── Cart Page ──────────────────────────────
function CartPage({setPage,cartItems,dispatch}){
  const totalItems = cartItems.reduce((t,i)=>t+i.quantity,0);
  const totalCost  = cartItems.reduce((t,i)=>t+i.price*i.quantity,0);
  if(cartItems.length===0) return h('div',{className:'cart-page'},
    h(Navbar,{page:'cart',setPage,cartItems}),
    h('div',{className:'cart-page-header'},h('h1',null,'Your Cart'),h('p',{className:'cart-summary-counts'},'0 items')),
    h('div',{className:'cart-container cart-empty'},
      h('h2',null,'Your cart is empty 🌱'),
      h('p',null,'Browse our beautiful plant collection and add something you love.'),
      h('button',{className:'btn-continue',onClick:()=>setPage('plants')},'← Start Shopping')
    )
  );
  return h('div',{className:'cart-page'},
    h(Navbar,{page:'cart',setPage,cartItems}),
    h('div',{className:'cart-page-header'},
      h('h1',null,'Your Cart'),
      h('p',{className:'cart-summary-counts'},totalItems+' '+(totalItems===1?'plant':'plants')+' in your cart')
    ),
    h('div',{className:'cart-container'},
      h('div',{className:'cart-totals-bar'},
        h('div',null,
          h('div',{style:{fontSize:'.85rem',color:'var(--text-mid)',marginBottom:'.2rem'}},'Total Plants'),
          h('div',{className:'total-label'},totalItems+' '+(totalItems===1?'item':'items'))
        ),
        h('div',{style:{textAlign:'right'}},
          h('div',{style:{fontSize:'.85rem',color:'var(--text-mid)',marginBottom:'.2rem'}},'Order Total'),
          h('div',{className:'total-amount'},'$'+totalCost.toFixed(2))
        )
      ),
      cartItems.map(item=>
        h('div',{key:item.id,className:'cart-item'},
          h('img',{src:item.image,alt:item.name}),
          h('div',{className:'cart-item-info'},
            h('div',{className:'cart-item-name'},item.name),
            h('div',{className:'cart-item-unit-price'},'$'+item.price.toFixed(2)+' each')
          ),
          h('div',{className:'qty-controls'},
            h('button',{className:'qty-btn',onClick:()=>dispatch({type:'cart/updateQuantity',payload:{id:item.id,quantity:item.quantity-1}})},'−'),
            h('span',{className:'qty-display'},item.quantity),
            h('button',{className:'qty-btn',onClick:()=>dispatch({type:'cart/updateQuantity',payload:{id:item.id,quantity:item.quantity+1}})},'＋')
          ),
          h('div',{className:'cart-item-subtotal'},'$'+(item.price*item.quantity).toFixed(2)),
          h('button',{className:'btn-delete',onClick:()=>dispatch({type:'cart/removeItem',payload:item.id})},'✕')
        )
      ),
      h('div',{className:'cart-actions'},
        h('button',{className:'btn-continue',onClick:()=>setPage('plants')},'← Continue Shopping'),
        h('button',{className:'btn-checkout',onClick:()=>alert('🌿 Coming Soon! Our checkout is currently under development. Thank you for shopping at Paradise Nursery!')},'Checkout →')
      )
    )
  );
}

// ── App Root ───────────────────────────────
function App(){
  const [page,setPage] = useState('home');
  const [cartState,dispatch] = useReducer(cartReducer,{items:[]});
  const cartItems = cartState.items;
  switch(page){
    case 'plants': return h(ProductList,{setPage,cartItems,dispatch});
    case 'cart':   return h(CartPage,  {setPage,cartItems,dispatch});
    default:       return h(LandingPage,{setPage});
  }
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App));
</script>
</body>
</html>
